<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Blogs | Sonic Business</title>
    <meta name="description" content="Notes, releases, newsletters, and show updates from Sonic Business.">
    <link rel="stylesheet" href="/site.css">
  </head>
  <body>
    <div class="site-frame">
      <header class="site-header">
        <a class="site-brand" href="/">Sonic Business</a>
        <nav class="site-nav" aria-label="Main navigation">
          
            <a href="/">Home</a>
          
            <a href="/blog/" aria-current="page">Blog</a>
          
        </nav>
      </header>

      <main class="site-main">
        
  
  

  <section class="page-header">
    <p class="eyebrow">Blog</p>
    <h1>Blogs</h1>
    
      
        <p class="page-copy">Filter the archive by type and browse every post in a responsive grid.</p>
      
    
  </section>

  
    <div class="filter-tabs" role="tablist" aria-label="Filter blog posts">
      <button class="filter-tab is-active" type="button" role="tab" aria-selected="true" data-filter="all">All Posts</button>
      <button class="filter-tab" type="button" role="tab" aria-selected="false" data-filter="releases">Releases</button>
      <button class="filter-tab" type="button" role="tab" aria-selected="false" data-filter="newsletter">Newsletter</button>
      <button class="filter-tab" type="button" role="tab" aria-selected="false" data-filter="shows">Shows</button>
      <button class="filter-tab" type="button" role="tab" aria-selected="false" data-filter="misc">Misc</button>
    </div>
  

  <section class="post-grid js-filter-grid" data-default-filter="all">
    
      

<article class="post-card" data-groups="misc">
  <div class="post-card-body">
    <div class="post-card-meta">
      <span class="post-chip">Misc</span>
      <time datetime="2025-11-10">10 Nov 2025</time>
    </div>
    <h2><a href="/blog/first-post/">First Post</a></h2>
    
      <p>Testing summary</p>
    
  </div>
</article>

    
  </section>

  
    <script src="/blog-filters.js" defer></script>
  

      </main>
    </div>
  </body>
</html>
