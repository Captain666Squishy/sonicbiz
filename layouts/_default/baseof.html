<!DOCTYPE html>
<html lang="{{ site.Language.Lang | default "en" }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} | {{ site.Title }}{{ end }}</title>
    <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ with .Summary }}{{ . | plainify }}{{ else }}{{ site.Params.description }}{{ end }}{{ end }}">
    <link rel="stylesheet" href="{{ "site.css" | relURL }}">
  </head>
  <body>
    <div class="site-frame">
      <header class="site-header">
        <a class="site-brand" href="{{ "/" | relURL }}">{{ site.Title }}</a>
        <nav class="site-nav" aria-label="Main navigation">
          {{ range site.Menus.main }}
            <a href="{{ .URL | relURL }}"{{ if $.IsMenuCurrent "main" . }} aria-current="page"{{ end }}>{{ .Name }}</a>
          {{ end }}
        </nav>
      </header>

      <main class="site-main">
        {{ block "main" . }}{{ end }}
      </main>
    </div>
  </body>
</html>
